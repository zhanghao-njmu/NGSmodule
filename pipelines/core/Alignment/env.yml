# Conda environment for the Alignment pipeline.
#
# Build:
#   mamba env create -f env.yml
#   conda activate ngsmodule-Alignment
#
# Versions track pipelines/docker/Alignment.Dockerfile so container and
# bare-metal runs agree.

name: ngsmodule-Alignment
channels:
  - bioconda
  - conda-forge
dependencies:
  - python=3.11
  - star=2.7.11a
  - bwa-mem2=2.2.1
  - hisat2=2.2.1
  - bismark=0.24.2
  - samtools=1.19
  - pigz=2.8
  - jq
