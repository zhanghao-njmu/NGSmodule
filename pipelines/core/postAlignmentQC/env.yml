# Conda environment for the postAlignmentQC pipeline.
#
# Build:
#   mamba env create -f env.yml
#   conda activate ngsmodule-postAlignmentQC

name: ngsmodule-postAlignmentQC
channels:
  - bioconda
  - conda-forge
dependencies:
  - python=3.11
  - rseqc=5.0.3
  - preseq=3.2.0
  - mosdepth=0.3.5
  - goleft=0.2.4
  - ucsc-gtftogenepred=447
  - ucsc-genepredtobed=447
  - samtools=1.19
  - jq
