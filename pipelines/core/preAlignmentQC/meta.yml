# Pipeline metadata.
#
# Consumed by:
#   - The CLI dispatcher (auto-discovery — drop a directory under
#     pipelines/core/ with a meta.yml and it appears as a mode).
#   - backend/init_pipeline_templates.py to seed the PipelineTemplate DB row
#     so the web UI shows the same name + parameters + resource hints.
#   - The web Result viewer (knows what kind of artefacts to expect).
#
# Keep this file flat. The orchestrator's parser only handles top-level
# scalars + a single `default_params:` map; richer schemas would need a
# real YAML library.

name: preAlignmentQC
display_name: Pre-Alignment Quality Control
category: Quality Control
version: 1.0.0
description: >
  Adapter trimming and quality filtering of raw FASTQ reads before alignment.
  Produces trimmed FASTQ + interactive HTML/JSON QC report per sample.
tools:
  - fastp >= 0.23
  - fastqc >= 0.12
container: ngsmodule/preAlignmentQC:1.0.0
default_params:
  min_quality: 20
  min_length: 50
  trim_front1: 0
  trim_front2: 0
  detect_adapter_for_pe: true
# Typed schema — see pipelines/lib/schema.sh.
params_schema:
  min_quality:
    type: int
    min: 0
    max: 50
    default: 20
    description: fastp -q phred quality cutoff.
  min_length:
    type: int
    min: 1
    max: 500
    default: 50
    description: fastp -l minimum read length to retain.
  trim_front1:
    type: int
    min: 0
    max: 100
    default: 0
    description: Bases to trim from 5' end of R1.
  trim_front2:
    type: int
    min: 0
    max: 100
    default: 0
    description: Bases to trim from 5' end of R2 (PE only).
  detect_adapter_for_pe:
    type: bool
    default: true
    description: Auto-detect adapters for paired-end reads.
estimated_minutes_per_sample: 30
# Cluster scheduler hints — see pipelines/profiles/.
resources:
  mem: 8G
  time: "2:00:00"
  cpus_per_task: 4
  partition: short
  queue: main
inputs:
  kind: fastq
  pattern: "run*_{sample}*.fq.gz"
outputs:
  - kind: trimmed_fastq
    pattern: "{sample}_trim_{1,2}.fq.gz"
  - kind: qc_report_html
    pattern: "{sample}_fastp.html"
  - kind: qc_report_json
    pattern: "{sample}_fastp.json"
