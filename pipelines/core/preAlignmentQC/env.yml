# Conda environment for the preAlignmentQC pipeline.
#
# Replaces the legacy CheckENV.sh "NGSmodule-preAlignmentQC" env. Versions
# track pipelines/docker/preAlignmentQC.Dockerfile so that container and
# bare-metal runs agree.
#
# Build:
#   conda env create -f env.yml
#   conda activate ngsmodule-preAlignmentQC
#
# Or with mamba (faster):
#   mamba env create -f env.yml

name: ngsmodule-preAlignmentQC
channels:
  - bioconda
  - conda-forge
dependencies:
  - python=3.11
  - fastqc=0.12.1
  - fastp=0.23.4
  - fastq-screen=0.15.3
  - bowtie2=2.5.3
  - sortmerna=4.3.6
  - bbmap=39.06
  - pigz=2.8
  - samtools=1.19
  - jq                # used by pipeline.sh to extract metrics from fastp JSON
