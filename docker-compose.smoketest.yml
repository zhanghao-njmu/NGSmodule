# Smoke test override — runs core stack (postgres + redis + minio + backend +
# celery worker) on docker's internal network. Internal services don't bind
# host ports (so they don't collide with whatever else is on 5432/6379), but
# the BACKEND publishes 8000 so E2E tests outside docker can hit it.
#
# Usage:
#   docker compose -p ngs-smoke -f docker-compose.yml -f docker-compose.smoketest.yml up -d
#
# Tear down:
#   docker compose -p ngs-smoke -f docker-compose.yml -f docker-compose.smoketest.yml down -v

services:
  postgres:
    container_name: ngs-smoke-postgres
    ports: !reset []

  redis:
    container_name: ngs-smoke-redis
    ports: !reset []

  minio:
    container_name: ngs-smoke-minio
    ports: !reset []

  backend:
    container_name: ngs-smoke-backend
    # Replace the parent's '8000:8000' (host port commonly busy) with
    # an override that publishes the container's 8000 on host 8765 only.
    # The !override tag tells compose to replace, not merge, the list.
    ports: !override
      - '127.0.0.1:8765:8000'
    # Smoke-only: don't mount /opt/lcbio host dir (may not exist).
    volumes: !reset
      - ./backend:/app
      - ./:/app/NGSmodule
      - upload_data:/data/uploads
      - work_data:/data/ngsmodule_work
      - result_data:/data/ngsmodule_results

  celery-worker:
    container_name: ngs-smoke-celery
    volumes: !reset
      - ./backend:/app
      - ./:/app/NGSmodule
      - work_data:/data/ngsmodule_work
      - result_data:/data/ngsmodule_results

  # Skip flower + frontend: they aren't on the smoke-test critical path.
  flower:
    profiles: ['full-stack-only']

  frontend:
    profiles: ['full-stack-only']
